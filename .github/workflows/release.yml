name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write  # required for PyPI trusted publishing (OIDC)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - run: uv sync --extra dev
      - run: uv run python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Package conformance suite
        run: |
          mkdir -p conformance-pkg/fixtures
          cp tests/fixtures/*.fieldml conformance-pkg/fixtures/
          cp conformance/runner.py conformance/README.md conformance-pkg/
          cd conformance-pkg
          zip -r ../pyfieldml-conformance.zip .
      - uses: actions/upload-artifact@v4
        with:
          name: conformance
          path: pyfieldml-conformance.zip

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/pyfieldml/
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: conformance
          path: conformance-dist/
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            conformance-dist/pyfieldml-conformance.zip
          generate_release_notes: true
