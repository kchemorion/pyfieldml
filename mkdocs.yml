site_name: pyfieldml
site_description: A pure-Python implementation of FieldML 0.5 with evaluation engine and biomechanics model zoo.
site_url: https://kchemorion.github.io/pyfieldml/
repo_url: https://github.com/kchemorion/pyfieldml
repo_name: kchemorion/pyfieldml
edit_uri: edit/main/docs/

exclude_docs: |
  superpowers/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - content.code.annotate
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_signature_annotations: true
            separate_signature: true
  - mkdocs-jupyter:
      include: ["*.ipynb"]

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - FAQ: faq.md
  - Cite: cite.md
  - Notebooks:
      - Quickstart: notebooks/01_quickstart.ipynb
      - Evaluator graph: notebooks/02_evaluator_graph.ipynb
      - Muscle fibers: notebooks/04_muscle_fibers.ipynb
  - API reference: api/index.md
